---
# Defaults for the tailscale role. The role installs Tailscale from the official
# apt repo, enables tailscaled, and (idempotently) joins the tailnet from an
# auth key. Optionally advertises subnet routes (subnet-router mode), in which
# case it also enables IP forwarding.

# Package. Leave the version empty to track the repo's current Tailscale; pin
# (e.g. "1.80.0") for reproducibility — same policy as the other roles.
tailscale_package: tailscale
tailscale_version: ""

# Auth key — REQUIRED at run time, supplied via the consumer's vault, never set
# here. A tagged, reusable/pre-authorized key lets the node come up unattended
# and ACL'd. Empty by default so `--check` can validate the variable surface
# without a secret present; the role asserts it is set before actually joining.
tailscale_authkey: ""

# Subnet-router mode. A CIDR (or comma-separated CIDRs) to advertise to the
# tailnet, e.g. "192.168.178.0/24". Empty = advertise nothing (plain node).
# When non-empty the role enables IPv4/IPv6 forwarding (a subnet router must
# forward), and the route must still be approved once in the admin console.
tailscale_advertise_routes: ""

# Exit-node mode. When true the node offers itself as an exit node, letting
# tailnet clients route ALL their internet traffic through it (full tunnel),
# e.g. from untrusted networks. Like subnet routing it requires IPv4/IPv6
# forwarding (enabled automatically) and must be approved once in the admin
# console; clients then opt in per-device ("use exit node"). Independent of
# tailscale_advertise_routes — a node can do either, both, or neither.
tailscale_advertise_exit_node: false

# Where the subnet-router / exit-node IP-forwarding sysctls are persisted. The
# role writes a dedicated drop-in here (not buried in /etc/sysctl.conf) and —
# because in an unprivileged LXC systemd-sysctl applies it too early, before the
# container's netns is up, so the value is reset to 0 on boot — also installs a
# small systemd unit that re-applies this file after network-online.target. Only
# used in subnet-router / exit-node mode.
tailscale_forwarding_sysctl_file: /etc/sysctl.d/99-tailscale-forwarding.conf

# Accept DNS config pushed by the tailnet (MagicDNS / global nameserver). False
# on a subnet router — it lives on the LAN and keeps its own resolver; remote
# *clients* are the ones that should accept tailnet DNS (set in the admin
# console), not the router.
tailscale_accept_dns: false

# Node name in the tailnet. Empty = let Tailscale use the system hostname.
tailscale_hostname: ""

# Extra args appended verbatim to `tailscale up` (whitespace-separated), for
# one-off flags this role does not model. Empty = none.
tailscale_up_extra_args: ""

# systemd service name (rarely overridden).
tailscale_service: tailscaled

# apt repo wiring. The keyring lives in /etc/apt/keyrings under the modern
# signed-by convention (apt-key is deprecated) — same approach as the
# zigbee2mqtt role's NodeSource setup. The URLs are keyed off the Debian
# release, so gather_facts must be on in the consuming play.
tailscale_apt_keyring_path: "/etc/apt/keyrings/tailscale.noarmor.gpg"
tailscale_apt_key_url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
tailscale_apt_list_path: "/etc/apt/sources.list.d/tailscale.list"
tailscale_apt_repo: >-
  deb [signed-by={{ tailscale_apt_keyring_path }}]
  https://pkgs.tailscale.com/stable/debian {{ ansible_distribution_release }} main
